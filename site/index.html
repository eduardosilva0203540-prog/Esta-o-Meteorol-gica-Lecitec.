<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Painel Meteorológico</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:linear-gradient(135deg,#0F2027,#203A43,#2C5364);
    color:white;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.container{
    width:90%;
    max-width:950px;
}

.topo{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:40px;
    flex-wrap:wrap;
}

h1{
    font-size:42px;
}

.relogio{
    text-align:right;
}

#hora{
    font-size:40px;
    font-weight:bold;
}

#data{
    font-size:18px;
    opacity:.9;
}

.local{
    margin-top:5px;
    font-size:15px;
    opacity:.7;
}

.cards{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:25px;
}

.card{
    background:rgba(255,255,255,.12);
    backdrop-filter:blur(15px);
    border-radius:20px;
    padding:30px;
    text-align:center;
    border:1px solid rgba(255,255,255,.2);
    transition:.3s;
}

.card:hover{
    transform:translateY(-8px);
}

.icone{
    font-size:55px;
}

.titulo{
    margin-top:15px;
    font-size:20px;
}

.valor{
    margin-top:15px;
    font-size:40px;
    font-weight:bold;
}

footer{
    margin-top:40px;
    text-align:center;
    opacity:.7;
}

</style>

</head>

<body>

<div class="container">

<div class="topo">

<div>
<h1>🌤 Painel Meteorológico</h1>
</div>

<div class="relogio">
<div id="hora"></div>
<div id="data"></div>
<div class="local">📍 Manaus - AM</div>
</div>

</div>

<div class="cards">

<div class="card">
<div class="icone">🌡️</div>
<div class="titulo">Temperatura</div>
<div class="valor">
<span id="temperatura">--</span> °C
</div>
</div>

<div class="card">
<div class="icone">💧</div>
<div class="titulo">Umidade</div>
<div class="valor">
<span id="umidade">--</span> %
</div>
</div>

<div class="card">
<div class="icone">🌫️</div>
<div class="titulo">Qualidade do Ar</div>
<div class="valor">
<span id="qualidadeAr">--</span>
</div>
</div>

</div>

<footer>
Atualização automática a cada 2 segundos
</footer>

</div>

<script>

async function atualizar(){

    try{

        const resposta = await fetch("http://localhost:3000/dados");
        const dados = await resposta.json();

        document.getElementById("temperatura").textContent = dados.temperatura;
        document.getElementById("umidade").textContent = dados.umidade;
        document.getElementById("qualidadeAr").textContent = dados.qualidadeAr;

    }catch(erro){

        console.log("Erro:", erro);

    }

}

function atualizarRelogio(){

    const agora = new Date();

    document.getElementById("hora").textContent =
        agora.toLocaleTimeString("pt-BR",{
            timeZone:"America/Manaus",
            hour:"2-digit",
            minute:"2-digit",
            second:"2-digit"
        });

    document.getElementById("data").textContent =
        agora.toLocaleDateString("pt-BR",{
            timeZone:"America/Manaus",
            weekday:"long",
            day:"2-digit",
            month:"long",
            year:"numeric"
        });

}

atualizar();
setInterval(atualizar,2000);

atualizarRelogio();
setInterval(atualizarRelogio,1000);

</script>

</body>
</html>
